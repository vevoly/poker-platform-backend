# Redis 额外配置
redis:
  prefix: poker
  env: dev
  token-expire-hours: 24
  single-login: true
  redisson:
    address: redis://localhost:6379
    #    password:
    connection-pool-size: 64
    connection-minimum-idle-size: 10

jwt:
  secret: your-secret-key-change-it-in-production
  expire-hours: 24

